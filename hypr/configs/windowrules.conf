# APPLIACTIONS BLUR
windowrule {
    name = windowrule_7
    match:tag = multimedia_video*
    no_blur = 1
}
windowrule {
    name = windowrule_8
    match:tag = multimedia_video*
    opacity = 1.0
}
windowrule {
    name = windowrule_9
    match:tag = settings*
    opacity = 0.8
}
windowrule {
    name = windowrule_10
    match:class = ^(org.gnome.Nautilus)$
    opacity = 0.8
}
windowrule {
    name = windowrule_11
    match:class = ^(gedit|org.gnome.TextEditor|mousepad)$
    opacity = 0.9
}
windowrule {
    name = floating_cava
    match:class = ^(floating-cava)$
    float = 1
    size = 800 450
    center = 1
}

windowrule {
    name = windowrule_12
    match:class = ^(org.pulseaudio.pavucontrol)$
    opacity = 0.9
}
windowrule {
    name = windowrule_13
    match:class = ^(kitty)$
    opacity = 0.9
}
windowrule {
    name = windowrule_14
    match:class = ^(discord|vesktop|org.telegram.desktop)$
    opacity = 0.85 override 0.7 override 1 override
}
windowrule {
    name = windowrule_15
    match:class = ^(Spotify)$
    opacity = 0.8 override 0.6 override 1 override
}
windowrule {
    name = windowrule_16
    match:class = ^(zen)$
    opacity = 0.9 override 0.7 override 1 override
}
#windowrule = opacity 0.8 override 0.6 override 1 override, tag:viewer*

# LAYER RULES
#layerrule = blur, rofi
#layerrule = ignore_zero, rofi
#layerrule = ignore_alpha 0.5, rofi
#layerrule = dimaround, rofi
#layerrule = animation popin 10%, rofi
#layerrule = blur, notifications
#layerrule = ignore_zero, notifications
layerrule {
    name = layerrule_1
    match:namespace = waybar
    blur = 1
}
#layerrule = ignore_zero, waybar
layerrule {
    name = layerrule_2
    match:namespace = waybar
    ignore_alpha = 0.5
}
layerrule {
    name = layerrule_3
    match:tag = notif*
    ignore_alpha = 0.5
}
layerrule {
    name = layerrule_4
    match:namespace = logout_dialog
    blur = 1
}

# SWAYNC BLUR & XRAY
layerrule {
    name = layerrule_5
    match:namespace = swaync-control-center
    blur = 1
}
layerrule {
    name = layerrule_6
    match:namespace = swaync-notification-window
    blur = 1
}
layerrule {
    name = layerrule_7
    match:namespace = swaync-control-center
    ignore_alpha = 0
}
layerrule {
    name = layerrule_8
    match:namespace = swaync-notification-window
    ignore_alpha = 0
}
layerrule {
    name = layerrule_9
    match:namespace = swaync-control-center
    ignore_alpha = 0.5
}
layerrule {
    name = layerrule_10
    match:namespace = swaync-notification-window
    ignore_alpha = 0.5
}
layerrule {
    name = layerrule_11
    match:namespace = swaync-control-center
    xray = 0
}
layerrule {
    name = layerrule_12
    match:namespace = swaync-notification-window
    xray = 0
}

#FLOAT
windowrule {
    name = windowrule_17
    match:tag = settings*
    float = 1
}
windowrule {
    name = windowrule_18
    match:tag = viewer*
    float = 1
}
windowrule {
    name = windowrule_19
    match:tag = multimedia_video*
    float = 1
}
windowrule {
    name = windowrule_20
    match:tag = multimedia_video*
    size = 900 506
}
windowrule {
    name = windowrule_21
    match:class = ^(org.pulseaudio.pavucontrol)$
    float = 1
}
windowrule {
    name = windowrule_22
    match:class = ^(org.pulseaudio.pavucontrol)$
    size = 50% 60%
}

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
    name = windowrule_23
    match:class = .*
    suppress_event = maximize
}

# Fix some dragging issues with XWayland
windowrule {
    name = windowrule_24
    match:class = ^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
    no_focus = 1
}

# POP UPS AND DIALOGUES
windowrule {
    name = windowrule_25
    match:title = ^(Save As|Save a File|Pick Files)$
    float = 1
}
windowrule {
    name = windowrule_26
    match:title = ^(Save As|Save a File|Pick Files)$
    size = 50% 60%
}
windowrule {
    name = windowrule_27
    match:title = ^(Save As|Save a File|Pick Files)$
    center = 1
}

windowrule {
    name = windowrule_28
    match:initial_title = (Open Files)
    float = 1
}
windowrule {
    name = windowrule_29
    match:initial_title = (Open Files)
    size = 70% 60%
}
